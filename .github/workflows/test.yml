name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows conventional commit format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR title: '$PR_TITLE'"
          if echo "$PR_TITLE" | grep -qP '^(feat|fix|refactor|test|docs|chore|wip|perf|ci|build|revert)(\([a-zA-Z0-9_./-]+\))?!?: .+'; then
            echo "PR title follows conventional commit format"
          else
            echo ""
            echo "PR title does not follow conventional commit format!"
            echo ""
            echo "Required format: {type}({scope}): {description}"
            echo "  Types: feat, fix, refactor, test, docs, chore, wip, perf, ci, build, revert"
            echo "  Scopes: hooks, skills, agents, cli, dashboard, templates, plugin, ci, config, tests, commands, refs"
            echo ""
            echo "WHY: git-cliff uses this to generate grouped changelogs."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            plugins/pbr/agents/*.md
            plugins/pbr/skills/**/SKILL.md
            plugins/pbr/references/*.md
            plugins/pbr/commands/*.md

  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin
        run: claude plugin validate plugins/pbr/

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        if: matrix.node-version != 18
        shell: bash
        run: npm run test:coverage

      - name: Run tests (Node 18, coverage not supported)
        if: matrix.node-version == 18
        shell: bash
        run: npm test

      - name: Install dashboard dependencies
        shell: bash
        run: cd dashboard && npm install --force && cd server && npm install

      - name: Run dashboard tests
        shell: bash
        continue-on-error: true
        run: npm run test:dashboard
