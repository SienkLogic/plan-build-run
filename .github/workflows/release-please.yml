name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_only:
        description: 'Skip release-please, just publish current version to npm'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

# Only one Release workflow at a time — prevents duplicate tags and publish races
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Clean internal scopes from the release PR body so it's user-facing
      - name: Clean release PR body
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.release.outputs.pr).number }}
        run: |
          BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body' --repo ${{ github.repository }})
          CLEANED=$(echo "$BODY" | node -e "
            const {cleanChangelog} = require('./scripts/clean-changelog.js');
            let input = '';
            process.stdin.on('data', d => input += d);
            process.stdin.on('end', () => process.stdout.write(cleanChangelog(input)));
          ")
          echo "$CLEANED" | gh pr edit "$PR_NUMBER" --body-file - --repo ${{ github.repository }}

      # Don't auto-merge — let releases be deliberate.
      # Merge manually when ready: gh pr merge --merge

  clean-release-notes:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4

      - name: Clean changelog and release notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          # Clean the CHANGELOG.md committed by release-please
          node scripts/clean-changelog.js --write

          # Commit cleaned changelog back to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: clean changelog scopes [skip ci]"
          git push || true

          # Clean the GitHub Release body too
          BODY=$(gh release view "$TAG_NAME" --json body --jq '.body')
          CLEANED=$(echo "$BODY" | node -e "
            const {cleanChangelog} = require('./scripts/clean-changelog.js');
            let input = '';
            process.stdin.on('data', d => input += d);
            process.stdin.on('end', () => process.stdout.write(cleanChangelog(input)));
          ")
          echo "$CLEANED" | gh release edit "$TAG_NAME" --notes-file -

  publish-npm:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created || (github.event_name == 'workflow_dispatch' && inputs.publish_only) }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm test
      - run: npm run validate

      - name: Check if version already published
        id: check-npm
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "@sienklogic/plan-build-run@$VERSION" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already on npm — skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not on npm — will publish"
          fi

      - name: Publish to npm
        if: steps.check-npm.outputs.already_published != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
