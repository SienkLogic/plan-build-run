name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_only:
        description: 'Skip release-please, just publish current version to npm'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Enable auto-merge on release PR
        if: ${{ steps.release.outputs.pr }}
        run: gh pr merge ${{ fromJSON(steps.release.outputs.pr).number }} --merge --auto --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

  clean-release-notes:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4

      - name: Clean changelog and release notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          # Clean the CHANGELOG.md committed by release-please
          node scripts/clean-changelog.js --write

          # Commit cleaned changelog back to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: clean changelog scopes [skip ci]"
          git push || true

          # Clean the GitHub Release body too
          BODY=$(gh release view "$TAG_NAME" --json body --jq '.body')
          CLEANED=$(echo "$BODY" | node -e "
            const {cleanChangelog} = require('./scripts/clean-changelog.js');
            let input = '';
            process.stdin.on('data', d => input += d);
            process.stdin.on('end', () => process.stdout.write(cleanChangelog(input)));
          ")
          echo "$CLEANED" | gh release edit "$TAG_NAME" --notes-file -

  publish-npm:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created || (github.event_name == 'workflow_dispatch' && inputs.publish_only) }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm test
      - run: npm run validate

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
