name: Release

on:
  push:
    tags:
      - 'plan-build-run-v*'
  workflow_dispatch:
    inputs:
      publish_only:
        description: 'Just publish current version to npm (no release)'
        type: boolean
        default: false

permissions:
  contents: write

# Only one Release workflow at a time — prevents duplicate tags and publish races
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/plan-build-run-v') || (github.event_name == 'workflow_dispatch' && inputs.publish_only) }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm test

      - name: Check if version already published
        id: check-npm
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if npm view "@sienklogic/plan-build-run@$VERSION" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already on npm — skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not on npm — will publish"
          fi

      - name: Publish to npm
        if: steps.check-npm.outputs.already_published != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
