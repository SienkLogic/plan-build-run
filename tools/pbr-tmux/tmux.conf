# PBR TMUX Configuration
# Optimized for Claude Code on Windows 11 via WSL2
# See: references/tmux-setup.md for installation and usage

# --- Terminal settings (CRITICAL for WSL2 interop) ---
# tmux-256color is REQUIRED — screen-256color causes Windows .exe hangs in WSL2
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 10
set -g focus-events on

# --- Behavior ---
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
setw -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S: #W"

# --- Keybindings: pane navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Keybindings: intuitive splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Clipboard (WSL2 — prefer xclip with WSLg, fall back to clip.exe) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
if-shell 'command -v xclip' {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
} {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"
}

# --- Status bar (PBR-aware) ---
set -g status-interval 10
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 30
set -g status-right-length 80
set -g status-left "#[fg=#89b4fa,bold] #S "
set -g status-right "#(bash $HOME/.tmux/pbr-status.sh 2>/dev/null) #[fg=#a6adc8]%H:%M"
